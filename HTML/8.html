<html>
<head>
  <meta charset="UTF-8">
  <title>Student Record Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    form {
      max-width: 500px;
      margin: auto;
    }
    label {
      display: block;
      margin-top: 15px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    .error {
      color: red;
      font-size: 0.9em;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>

<h2>Student Record Form</h2>

<form id="studentForm" onsubmit="return validateForm()">
  <label for="studentId">Student ID (numeric)*</label>
  <input type="text" id="studentId" name="studentId">
  <div class="error" id="idError"></div>

  <label for="name">Name*</label>
  <input type="text" id="name" name="name">
  <div class="error" id="nameError"></div>

  <label for="email">Email Address*</label>
  <input type="text" id="email" name="email">
  <div class="error" id="emailError"></div>

  <label for="age">Age (numeric)*</label>
  <input type="text" id="age" name="age">
  <div class="error" id="ageError"></div>

  <label for="course">Course (Must be 'Computer Science' or 'Mathematics')*</label>
  <input type="text" id="course" name="course">
  <div class="error" id="courseError"></div>

  <button type="submit">Submit</button>
</form>
<script>
function validateForm() {
  document.querySelectorAll('.error').forEach(el => el.innerText = '');

  let isValid = true;

  const id = document.getElementById('studentId').value.trim();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const age = document.getElementById('age').value.trim();
  const course = document.getElementById('course').value.trim().toLowerCase();

  
  if (!id) {
    document.getElementById('idError').innerText = "Student ID is required.";
    isValid = false;
  } else if (isNaN(id)) {
    document.getElementById('idError').innerText = "Student ID must be numeric.";
    isValid = false;
  }  if (!name) {
    document.getElementById('nameError').innerText = "Name is required.";
    isValid = false;
  }

  if (!email) {
    document.getElementById('emailError').innerText = "Email is required.";
    isValid = false;
  } else if (!/^\S+@\S+\.\S+$/.test(email)) {
    document.getElementById('emailError').innerText = "Invalid email format.";
    isValid = false;
  }
  if (!age) {
    document.getElementById('ageError').innerText = "Age is required.";
    isValid = false;
  } else if (isNaN(age)) {
    document.getElementById('ageError').innerText = "Age must be numeric.";
    isValid = false;
  }

  if (!course) {
    document.getElementById('courseError').innerText = "Course is required.";
    isValid = false;
  } else if (course !== "computer science" && course !== "mathematics") {
    document.getElementById('courseError').innerText = "Course must be 'Computer Science' or 'Mathematics'.";
    isValid = false;
  }
  return isValid;
}
</script>

</body>
</html>
