<html>
<head>
<style>
p.dotted{border-style:dotted;}
p.dashed{border-style:dashed;}
p.solid{border-style:solid;}
p.double{border-style:double;}
p.groove{border-style:groove;}
p.ridge{border-style:ridge;}
p.inset{border-style:inset;}
p.outset{border-style:outset;}
p.none{border-style:none;}
p.hidden{border-style:hidden;}
p.mix{border-style:dotted dashed solid double;}
</style>
</head>
<body>
<h2>The Border-Style Property</h2>
<p class="dotted">This is a dotted</p>
<p class="dashed">This is a dashed</p>
<p class="solid">This is a solid</p>
<p class="groove">This is a groove</p>
<p class="ridge">This is a ridge</p>
<p class="inset">This is a inset</p>
<p class="outset">This is a outset</p>
<p class="none">This is a none</p>
<p class="mix">This is a mix</p>
<p class="hidden">This is a hidden</p>
</body>
</html>
