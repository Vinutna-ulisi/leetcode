<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <style>
        #timer {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            font-family: 'Arial', sans-serif;
        }
        .btn-box {
            display: flex;
            justify-content: center;
            margin: 20px;
            padding:50px;
        }
        .btn{
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.5rem;
            padding: 20px 30px;
            margin-right: 30px;
        }
        .start{
            background-color: #4CAF50;
        }
        .stop{
            background-color: #f44336;
        }
        .reset{
            background-color: #f4fc1f;
        }
        </style>
</head>
<body>  
    <div id="timer">
        <h1 id="hours">00</h1>
        <h1>:</h1>
        <h1 id="minutes">00</h1>
        <h1>:</h1>
        <h1 id="seconds">00</h1>
    </div>
    <div class="btn-box">
        <button class="btn start" onclick="startTimer()" >Start</button>
        <button class="btn stop" onclick="stopTimer()" >Stop</button>
        <button class="btn reset" onclick="resetTimer()" >Reset</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
