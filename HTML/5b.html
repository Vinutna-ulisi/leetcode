<html>
<head>
<title>Box Model Card</title>
<style>
.card {
width: 250px;
margin: 30px auto;
padding: 20px;
border: 2px solid #0077cc;
background-color: #f0f8ff;
border-radius: 8px;
box-shadow: 0 0 10px #aaa;
font-family: Arial;
}
.card h3 {
margin-top: 0;
}
</style>
</head>
<body>
<div class="card">
<h3>Box Model Card</h3>
<p>This card uses:</p>
<ul>
<li><b>Margin</b> to center the card</li>
<li><b>Padding</b> inside the border</li>
<li><b>Border</b> with color</li>
<li><b>Content</b> area with text</li>
</ul>
</div>
</body>
</html>
