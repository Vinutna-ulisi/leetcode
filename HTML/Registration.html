<html>
<head>
 <title>Student Registration Form</title>
</head>
<body>
<h2>Student Registration Form</h2>
<table>
<form>
<label for="Rollno":>Roll no: </label> 
<input type="text" name="roll"><br><br>
<label for="Student Name:">Student name: </label>
<input type="text" placeholder="First Name"> 
<input type="text" placeholder="Last Name"><br><br>
<label for="Father's Name:">Father's name :</label>
<input type="text"><br><br>
<label for="Date of birth:">Date of birth : </label>
<input type="text" placeholder="Day">
<input type="text" placeholder="Month">
<input type="text" placeholder="Year">
(DD-MM-YYYY)<br><br>
<label for="Mobile no:">Mobile no :</label>
+91 <input type="text"><br><br>
<label for=Email id:">Email id : </label>
<input type="email"><br><br>
<label for="Password:">Password : </label>
<input type="password"><br><br>
<label for="Gender:">Gender :</label>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female<br><br>
<label for="Department:">Department :</label>
<input type="checkbox"> CSE
<input type="checkbox"> IT
<input type="checkbox"> ECE
<input type="checkbox"> Civil
<input type="checkbox"> Mech<br><br>
<label for="Course:">Course : </label>
<select>
<option> Select Current Course's </option>
<option>B.Tech</option>
<option>M.Tech</option>
<option>BCA</option>
<option>MBA</option>
</select><br><br>
<label for="Student photo">Student photo :</label>
<input type="file"><br><br>
<label for="City">City :</label>
<input type="text"><br><br>
<label for="Address">Address :</label>
<textarea rows="4" cols="30"></textarea><br><br>
< input type="submit" value="Register"> 
</table>
</form>
</body>
</html>
