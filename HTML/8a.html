<html>
<head>
<title>Feedback Form</title>
</head>
<body>
<h3>Feedback Survey</h3>
<form onsubmit="return validateForm()">
Name: <input type="text" id="name"><br><br>
Rating (1–5): <input type="number" id="rating"><br><br>
Comments: <br>
<textarea id="comments"></textarea><br><br>
<button type="submit">Submit</button>
</form>
<p id="message" style="color:red;"></p>
<script>
function validateForm() {
const name = document.getElementById("name").value.trim();
const rating = parseInt(document.getElementById("rating").value);
const comments = document.getElementById("comments").value.trim();
const msg = document.getElementById("message");
if (name === "") {
msg.innerText = "Name is required.";
return false;
}
if (isNaN(rating) || rating < 1 || rating > 5) {
msg.innerText = "Rating must be a number between 1 and 5.";
return false;
}
if (comments === "") {
msg.innerText = "Comments are required.";
return false;
}
msg.style.color = "green";
msg.innerText = "Feedback submitted successfully!";
return false;
}
</script>
</body>
</html>
