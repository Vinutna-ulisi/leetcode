<html>
<head>
<title>Newsletter Registration</title>
</head>
<body bgcolor="lightpink">
<h1><b><center>Subscribe to Our Newsletter</center></b></h1>
<form>
<center>
<table>
 <tr>
<td>Name</td>
<td><input type="text" name="name" required ><br></td>
</tr>
<tr>
<td>Email</td>
<td><input type="email" name="email" required><br></td>
</tr>
<tr>
<td>Gender</td>
<td><input type="radio" name="gender" value="Male"> Male</td>
<td><input type="radio" name="gender" value="Female"> Female<br></td>
 </tr>
<tr>
<td><b>Interests</b><br></td>
<td><input type="checkbox" name="tech"> Technology<br></td>
<td><input type="checkbox" name="health"> Health<br></td>
<td><input type="checkbox" name="travel"> Travel</td>
</tr>
<tr>
<td colspan="2" align="center">
<td><input type="submit" value="Subscribe"></td>
</tr>
</table>
</center>
</form>
</body>
</html>
