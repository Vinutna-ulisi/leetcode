<html>
<head>
<title>Order Form - DVR BOOKS</title>
<style>
  body {
    background-color: beige;
    font-family: Arial;
    text-align: center;
  }
  h1 {
    color: brown;
  }
  form {
    background-color: white;
    width: 300px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 2px 2px 8px gray;
    text-align: left;
  }
  label {
    font-weight: bold;
  }
  input, textarea {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
  }
  button {
    background-color: darkblue;
    color: white;
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover {
    background-color: navy;
  }
</style>
</head>
<body>

<h1>Place Your Order</h1>

<form>
  <label>Full Name:</label><br>
  <input type="text" name="name" required><br>

  <label>Mobile Number:</label><br>
  <input type="text" name="mobile" required><br>

  <label>Delivery Address:</label><br>
  <textarea name="address" rows="3" required></textarea><br>

  <label>Book Name:</label><br>
  <input type="text" name="book" value="(Selected Book)" required><br>

  <button type="submit">Confirm Order</button>
</form>

<p><a href="categories.html">Back to Categories</a></p>

</body>
</html>
